<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Convert °C to °F</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <h1 id="title" class="title">Convert °C to °F</h1>

    <form class="form" autocomplete="off">
        <input type="text" id="celsius__fahrenheit" class="form__input"  placeholder="°C">

        <p  class="form__input" id="output">output</p>

        <div class="wrapper__btn">
            <button type="button" class="btn btn__convert" id="btn__convert">CONVERT</button>
            <button type="reset" class="btn btn__reset" id="btn__reset">RESET</button>
            <button type="button" class="btn btn__change" id="btn__change">CHANGE</button>
        </div>

    </form>




</div>

<script src="script/index.js"></script>
</body>
</html>
