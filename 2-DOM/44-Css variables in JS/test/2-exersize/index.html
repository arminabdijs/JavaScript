<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="script/index.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="wrraper__input">
        <input type="text" class="input" id="input" name="input" />
      </div>
      <div class="wrraper__keyboard">
        <div class="wrraper__keyboard--cells">
          <div class="cell" data-id="27">ESC</div>
          <div class="cell" data-id="49">1</div>
          <div class="cell" data-id="50">2</div>
          <div class="cell" data-id="51">3</div>
          <div class="cell" data-id="52">4</div>
          <div class="cell" data-id="53">5</div>
          <div class="cell" data-id="54">6</div>
          <div class="cell" data-id="55">7</div>
          <div class="cell" data-id="56">8</div>
          <div class="cell" data-id="57">9</div>
          <div class="cell" data-id="48">0</div>
          <div class="cell" data-id="189">-</div>
          <div class="cell" data-id="187">+</div>
          <div class="cell" data-id="8">BACK</div>
        </div>
        <div class="wrraper__keyboard--cells">
          <div class="cell" data-id="9">TAB</div>
          <div class="cell" data-id="81">Q</div>
          <div class="cell" data-id="87">W</div>
          <div class="cell" data-id="69">E</div>
          <div class="cell" data-id="82">R</div>
          <div class="cell" data-id="84">T</div>
          <div class="cell" data-id="89">Y</div>
          <div class="cell" data-id="85">U</div>
          <div class="cell" data-id="73">I</div>
          <div class="cell" data-id="79">O</div>
          <div class="cell" data-id="80">P</div>
          <div class="cell" data-id="219">[</div>
          <div class="cell" data-id="221">]</div>
          <div class="cell" data-id="220">\</div>
        </div>
        <div class="wrraper__keyboard--cells">
          <div class="cell" data-id="20">CAPS</div>
          <div class="cell" data-id="65">A</div>
          <div class="cell" data-id="83">S</div>
          <div class="cell" data-id="68">D</div>
          <div class="cell" data-id="70">F</div>
          <div class="cell" data-id="71">G</div>
          <div class="cell" data-id="72">H</div>
          <div class="cell" data-id="74">J</div>
          <div class="cell" data-id="75">K</div>
          <div class="cell" data-id="76">L</div>
          <div class="cell" data-id="186">:</div>
          <div class="cell" data-id="222">"</div>
          <div class="cell" data-id="13">ENTER</div>
        </div>
        <div class="wrraper__keyboard--cells">
          <div class="cell" data-id="ShiftLeft">SHIFT</div>
          <div class="cell" data-id="90">Z</div>
          <div class="cell" data-id="88">X</div>
          <div class="cell" data-id="67">C</div>
          <div class="cell" data-id="86">V</div>
          <div class="cell" data-id="66">B</div>
          <div class="cell" data-id="78">N</div>
          <div class="cell" data-id="77">M</div>
          <div class="cell" data-id="188">,</div>
          <div class="cell" data-id="190">.</div>
          <div class="cell" data-id="191">/</div>
          <div class="cell" data-id="ShiftRight">SHIFT</div>
        </div>
      </div>
      <h2 class="title">hands on the keyboard</h2>
    </div>
  </body>
</html>
