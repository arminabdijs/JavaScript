<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="script/index.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card__image">
          <img
            src="./assets/images/itachi-uchiha-dark-3840x2160-20031.jpg"
            alt=""
            class="profile__img"
          />
        </div>
        <div class="card__content">
          <h2 class="card__title">Emily Fisher</h2>
          <p class="card__activity-basin">Senior Web Developer</p>

          <div class="content__follows">
            <div class="wrapper__followers">
              <h3 class="follow__count">16K</h3>
              <h4 class="follow__title">Followers</h4>
              <button class="follow__btn">Follow</button>
            </div>
            <div class="wrapper__following">
              <h3 class="follow__count">852</h3>
              <h4 class="follow__title">Following</h4>
              <button class="message__btn">Message</button>
            </div>
          </div>
        </div>
      </div>
      <div class="wrapper__color-plates">
        <div class="color-plate" style="background-color: #248acb"></div>
        <div class="color-plate" style="background-color: #f50c4b"></div>
        <div class="color-plate" style="background-color: #0da64d"></div>
        <div class="color-plate" style="background-color: #8637a1"></div>
        <div class="color-plate" style="background-color: #e8ae29"></div>
      </div>
    </div>
  </body>
</html>
