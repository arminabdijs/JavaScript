<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Photo Slider</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="script/index.js"></script>
  </head>
  <body>
    <img src='' alt="" class="blur-layer" />
    <div class="flip">
      <div class="icon icon-prev__div">
        <svg
          class="icon-prev"
          viewBox="0 0 24 24"
          width="28"
          height="28"
          fill="#b7e1ea"
          stroke="#b7e1ea"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="19 20 9 12 19 4 19 20"></polygon>
          <polygon points="19 20 9 12 19 4 19 20"></polygon>
          <line x1="5" y1="4" x2="5" y2="20"></line>
        </svg>
      </div>
      <img class="photo-slider" src='' alt="" />
      <div class="icon icon-next__div">
        <svg
          class="icon-next"
          viewBox="0 0 24 24"
          width="28"
          height="28"
          fill="#b7e1ea"
          stroke="#b7e1ea"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="5 4 15 12 5 20 5 4"></polygon>
          <polygon points="5 4 15 12 5 20 5 4"></polygon>
          <line x1="19" y1="4" x2="19" y2="20"></line>
        </svg>
      </div>
    </div>
  </body>
</html>
