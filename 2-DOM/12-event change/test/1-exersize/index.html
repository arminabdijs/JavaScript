<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Transport Services</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <form action="" class="form">
        <div class="wrapper__input">
            <input type="text" name="First__Name" id="First__Name" placeholder="First Name" class="form__input">

            <input type="text" name="Last__Name" id="Last__Name" placeholder="Last Name" class="form__input">

            <input type="tel" name="Phone__Number" id="Phone__Number" placeholder="Phone Number" class="form__input">

            <input type="email" name="Email" id="Email" placeholder="Email" class="form__input">

            <select name="country" id="country" class="form__input">
                <option value="please select country">please select country</option>

            </select>

            <select name="city" id="city" class="form__input">
                <option value="please select city">please select city</option>

            </select>
        </div>


        <div class="wrapper__btn">
            <button type="submit" class="btn">Book Ticket</button>
        </div>
    </form>
</div>

<script src="script/index.js"></script>
</body>
</html>
