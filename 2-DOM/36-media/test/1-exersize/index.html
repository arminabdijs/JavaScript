<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatify</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="music-player">
    <div class="album-cover">
        <img id="cover" src="" alt="Album Cover">
    </div>

    <div class="track-info">
        <h3 id="title">Developing</h3>
        <p id="artist">Flora Cash</p>
    </div>

    <div class="progress-container" id="progress-container">
        <div class="progress" id="progress"></div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="duration">2:47</span>
        </div>
    </div>

    <div class="controls">
        <button id="prev" class="ctrl-btn">
            <!-- Left SVG -->
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#636363" stroke="#636363" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polygon points="19 20 9 12 19 4 19 20"></polygon>
                <polygon points="19 20 9 12 19 4 19 20"></polygon>
                <line x1="5" y1="4" x2="5" y2="20"></line>
            </svg>
        </button>

        <button id="play" class="ctrl-btn big">
            <!-- Play SVG -->
            <svg id="play-icon" viewBox="0 0 24 24" width="40" height="40" fill="#636363" stroke="#636363"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="6 4 20 12 6 20 6 4"></polygon>
            </svg>

            <!-- Pause SVG -->
            <svg id="pause-icon" viewBox="0 0 24 24" width="40" height="40" fill="#636363" stroke="#636363"
                 stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <line x1="6" y1="4" x2="6" y2="20"></line>
                <line x1="18" y1="4" x2="18" y2="20"></line>
            </svg>
        </button>

        <button id="next" class="ctrl-btn">
            <!-- Right SVG -->
            <svg viewBox="0 0 24 24" width="28" height="28" fill="#636363" stroke="#636363" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 4 15 12 5 20 5 4"></polygon>
                <polygon points="5 4 15 12 5 20 5 4"></polygon>
                <line x1="19" y1="4" x2="19" y2="20"></line>
            </svg>
        </button>
    </div>

    <audio id="audio" src="./assets/audio/Baba_Bah_Bah_FT_Mahyar.mp3"></audio>
</div>

<script src="./script/script.js"></script>
</body>
</html>
