<!doctype html>
<html >
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Menu</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body >
    <div class="context-menu" id="contextMenu" style="display: none;">
      <div class="menu-item">
        <!-- Share -->
        <svg viewBox="0 0 24 24">
          <path
            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.11-4.15a2.99 2.99 0 1 0-.91-1.46L8 9.84A3 3 0 1 0 8 14.16l7.19 4.05a2.996 2.996 0 1 0 .81-2.13z"
          />
        </svg>
        <span>Share</span>
      </div>

      <div class="menu-item">
        <!-- Rename -->
        <svg viewBox="0 0 24 24">
          <path
            d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm14.71-9.04a.996.996 0 0 0 0-1.41l-1.59-1.59a.996.996 0 1 0-1.41 1.41l1.59 1.59a.996.996 0 0 0 1.41 0z"
          />
        </svg>
        <span>Rename</span>
      </div>

      <div class="menu-item">
        <!-- Copy Link Address -->
        <svg viewBox="0 0 24 24">
          <path
            d="M3.9 12a4.1 4.1 0 0 1 4.1-4.1h4v2h-4a2.1 2.1 0 0 0 0 4.2h4v2h-4A4.1 4.1 0 0 1 3.9 12zm16.2 0a4.1 4.1 0 0 1-4.1 4.1h-4v-2h4a2.1 2.1 0 0 0 0-4.2h-4v-2h4a4.1 4.1 0 0 1 4.1 4.1z"
          />
        </svg>
        <span>Copy Link Address</span>
      </div>

      <div class="menu-item">
        <!-- Copy to -->
        <svg viewBox="0 0 24 24">
          <path
            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4h-8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16h-8V7h8v14z"
          />
        </svg>
        <span>Copy to</span>
      </div>

      <div class="menu-item">
        <!-- Move to -->
        <svg viewBox="0 0 24 24">
          <path d="M10 17l5-5-5-5v10zM19 3H5c-1.1 0-2 .9-2 2v14h2V5h14v14h2V5c0-1.1-.9-2-2-2z" />
        </svg>
        <span>Move to</span>
      </div>

      <div class="menu-item">
        <!-- Download -->
        <svg viewBox="0 0 24 24">
          <path d="M5 20h14v-2H5v2zm7-18v10l4-4h-3V2h-2v6h-3l4 4z" />
        </svg>
        <span>Download</span>
      </div>

      <div class="divider"></div>

      <div class="menu-item">
        <!-- Delete -->
        <svg viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
        </svg>
        <span>Delete</span>
      </div>
    </div>

    <script src="./script/script.js"></script>
  </body>
</html>
